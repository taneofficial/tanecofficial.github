<!DOCTYPE html>

<title>tane.co</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5efe6;
}

/* ÜST LOGO */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 60px;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#6E1F2F;
}

.logo span{
  display:block;
  font-size:12px;
  color:#444;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:center;
  gap:40px;
  background:#6E1F2F;
  padding:15px;
  position:sticky;
  top:0;
  z-index:1000;
}

.navbar a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

/* DROPDOWN KATEGORİ */
.dropdown{
  position:relative;
  display:inline-block;
}

.dropbtn{
  background:#6E1F2F;
  color:white;
  padding:10px 20px;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

.dropdown-content{
  display:none;
  position:absolute;
  background:white;
  min-width:180px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  z-index:1001;
}

.dropdown-content a{
  color:#333;
  padding:10px;
  display:block;
  text-decoration:none;
}

.dropdown:hover .dropdown-content{
  display:block;
}

.dropdown-content a:hover{
  background:#f2f2f2;
}

/* ANASAYFA KARTLARI */
.categories{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:60px;
  flex-wrap:wrap;
}

.card{
  background:white;
  width:220px;
  text-align:center;
  padding:20px;
  border-radius:8px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card a{
  text-decoration:none;
  color:#333;
  font-size:18px;
  font-weight:bold;
}

/* HERO */
.hero{
  display:flex;
  justify-content:center;
  margin-top:40px;
}

.hero img{
  width:500px;
  border-radius:6px;
}
</style>
</head>
